<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Guard Management</title>
    <link rel="stylesheet" href="../css/guards.css">
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">

        <h2>Security Portal</h2>

        <ul>
            <li onclick="location.href='dashboard.html'">Dashboard</li>
            
             <li onclick="location.href='guards.html'">Guards</li>

            <li onclick="location.href='incidents.html'">Incidents</li>

            <li onclick="location.href='reports.html'">Reports</li>

            <li id="logoutBtn"><i class="fas fa-sign-out-alt"></i>Logout</li>
        </ul>

    </div>

    <!-- Main -->

    <div class="main">

        <h1>Guard Management</h1>

        <form id="guardForm">

            <input
                type="text"
                id="fullName"
                placeholder="Full Name"
                required>

            <input
                type="text"
                id="phone"
                placeholder="Phone Number"
                required>

            <input
                type="email"
                id="email"
                placeholder="Email">

            <input
                type="text"
                id="address"
                placeholder="Address">

            <select id="status">

                <option>Active</option>

                <option>Inactive</option>

            </select>

            <button type="submit">

                Add Guard

            </button>

        </form>

        <p id="message"></p>

        <hr>

        <hr>

<h2>Existing Guards</h2>

<input
    type="text"
    id="searchGuard"
    placeholder="Search guard by name..."
>

        <table id="guardTable">

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Name</th>

                    <th>Phone</th>

                    <th>Status</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </div>

</div>

<script src="../js/guards.js"></script>

<div id="toast"></div>

</body>

</html>
