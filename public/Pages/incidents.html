<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Incident Management</title>

    <link rel="stylesheet" href="../css/incidents.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>Security Portal</h2>

        <ul>

            <li onclick="location.href='dashboard.html'">
                Dashboard
            </li>

            <li onclick="location.href='guards.html'">
                Guards
            </li>

            <li>
                Incidents
            </li>

            <li id="logoutBtn">
                Logout
            </li>

        </ul>

    </div>

    <!-- Main Content -->

    <div class="main">

        <h1>Incident Management</h1>

        <form id="incidentForm">

            <input
                type="text"
                id="title"
                placeholder="Incident Title"
                required>

            <textarea
                id="description"
                placeholder="Description"
                rows="4"></textarea>

            <input
                type="text"
                id="location"
                placeholder="Location"
                required>

            <input
                type="date"
                id="incidentDate"
                required>

            <select id="status">

                <option>Open</option>

                <option>Resolved</option>

            </select>

            <button type="submit">

                Add Incident

            </button>

        </form>

        <p id="message"></p>

        <hr>

        <h2>Existing Incidents</h2>

        <input

            type="text"

            id="searchIncident"

            placeholder="Search incident by title..."

        >

        <table id="incidentTable">

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Title</th>

                    <th>Location</th>

                    <th>Date</th>

                    <th>Status</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </div>

</div>

<div id="toast"></div>

<script src="../js/incidents.js"></script>

</body>

</html>
